kind = "web"
previewPath = "/"
title = "Sporting Events Survey"
version = "1.0.0"
id = "artifacts/sporting-events-survey-results"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22240

[services.development]
run = "pnpm --filter @workspace/sporting-events-survey-results run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sporting-events-survey-results", "run", "build" ]
publicDir = "artifacts/sporting-events-survey-results/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22240"
BASE_PATH = "/"
